# RobotOS v1.0 — Zephyr project configuration
# Used by: west build

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024

# Threading
CONFIG_NUM_COOP_PRIORITIES=16
CONFIG_NUM_PREEMPT_PRIORITIES=16
CONFIG_THREAD_MONITOR=y

# Timing
CONFIG_SYS_CLOCK_TICKS_PER_SEC=10000
CONFIG_TIMER_HAS_64BIT_CYCLE_COUNTER=y

# GPIO / PWM / I2C / SPI
CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_I2C=y
CONFIG_SPI=y

# Serial (for shell / G-code streaming)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE=y

# No heap (RobotOS discipline)
CONFIG_HEAP_MEM_POOL_SIZE=0

# Tracing (optional)
CONFIG_TRACING=y
CONFIG_TRACING_CTF=y

# RobotOS Adapter
CONFIG_RO_MAX_THREADS=8
CONFIG_RO_IPC_SLAB_SIZE=4096
CONFIG_RO_LOG_RING_SIZE=2048
CONFIG_RO_STEPPER_POOL_SIZE=4

# RobotOS Application
CONFIG_APP_PLANNER_TICK_HZ=1000
CONFIG_APP_CMD_QUEUE_DEPTH=64
CONFIG_APP_MAX_MOTION_SEGMENTS=64
CONFIG_APP_GCODE_LINE_MAX=96
CONFIG_APP_SHELL_STACK_SIZE=1024
CONFIG_APP_PLANNER_STACK_SIZE=2048
CONFIG_APP_PULSE_MGR_STACK_SIZE=1024
