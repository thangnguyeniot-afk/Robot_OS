# devkit/prj.conf
# Minimal Kconfig for STM32F411E-DISCO devkit bring-up.
# LOG via RTT (no USB-UART needed — reads through existing STLink debug USB).

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1536
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_BACKEND_RTT=y

# RTT (Segger J-Link RTT — supported by openocd xpack)
CONFIG_USE_SEGGER_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096

# GPIO (for LED blink)
CONFIG_GPIO=y

# Shell stays disabled (no command/CLI subsystem in Phase 9B).
CONFIG_SHELL=n

# Phase 9B: enable serial + interrupt-driven UART API for the devkit-local
# UART RX event producer (devkit_uart_producer.c). Uses external USB-UART
# adapter wired to PA3 (board RX). RTT remains the canonical log backend;
# UART is NOT used for logging or console I/O.
#
#   CONFIG_SERIAL=y                  # build the Zephyr serial driver
#   CONFIG_UART_INTERRUPT_DRIVEN=y   # uart_irq_callback_set / uart_fifo_read
#   CONFIG_UART_CONSOLE=n            # do NOT route console to UART (RTT only)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_CONSOLE=n

# Disable CTF tracing
CONFIG_TRACING=n
