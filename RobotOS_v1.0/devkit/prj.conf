# devkit/prj.conf
# Minimal Kconfig for STM32F411E-DISCO devkit bring-up.
# LOG via RTT (no USB-UART needed — reads through existing STLink debug USB).

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_BACKEND_RTT=y

# RTT (Segger J-Link RTT — supported by openocd xpack)
CONFIG_USE_SEGGER_RTT=y

# GPIO (for LED blink)
CONFIG_GPIO=y

# Shell + UART disabled (no VCP on STLink V1)
CONFIG_SHELL=n
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n

# Disable CTF tracing
CONFIG_TRACING=n
